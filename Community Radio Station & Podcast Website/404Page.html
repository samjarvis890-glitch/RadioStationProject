<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>404 — Signal Lost | WaveKind FM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    /* ============================================================
       VIBRANT RETRO 404 — "SIGNAL LOST"
       Fully Responsive · Tablet 2 Columns · Mobile 1 Column
       Works on iPad Air, Mini, Pro, Surface Pro, Nest Hub, Zenbook Fold, Galaxy Z Fold
    ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fef9e6 0%, #ffe6f0 50%, #e6f0ff 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      overflow-x: hidden;
      position: relative;
      color: #1a1a2e;
    }

    /* ========== ANIMATED WAVE BACKGROUND ========== */
    .wave-bg {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .wave {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(90deg, 
        rgba(255, 77, 109, 0.08) 0px, 
        rgba(255, 77, 109, 0.08) 2px,
        transparent 2px,
        transparent 8px);
      animation: slideWave 20s linear infinite;
    }

    @keyframes slideWave {
      0% { transform: translateX(0%); }
      100% { transform: translateX(50%); }
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      animation: floatBlob 15s ease-in-out infinite;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: #ff9eb5;
      top: -150px;
      right: -150px;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      background: #ffd966;
      bottom: -100px;
      left: -100px;
      animation-delay: -5s;
    }

    .blob-3 {
      width: 350px;
      height: 350px;
      background: #9bb8ff;
      top: 50%;
      left: 30%;
      animation-delay: -8s;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
    }

    /* ========== MAIN CONTAINER ========== */
    .error-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 2;
    }

    .error-content {
      max-width: 800px;
      width: 100%;
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 77, 109, 0.2);
    }

    /* ========== 404 NUMBER WITH GLITCH ========== */
    .glitch-wrapper {
      position: relative;
      margin-bottom: 1rem;
    }

    .glitch {
      font-size: clamp(5rem, 18vw, 15rem);
      font-weight: 900;
      font-family: 'Inter', 'Segoe UI', monospace;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ff4d6d, #ff8c42, #ff6b9d);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 3s linear infinite, float 3s ease-in-out infinite;
      position: relative;
      text-shadow: 0 0 30px rgba(255, 77, 109, 0.3);
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .glitch::before,
    .glitch::after {
      content: "404";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ff4d6d, #ff8c42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      opacity: 0.4;
      pointer-events: none;
    }

    .glitch::before {
      animation: glitchShift 0.25s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      transform: translateX(-2px);
    }

    .glitch::after {
      animation: glitchShift 0.25s infinite reverse;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      transform: translateX(2px);
    }

    @keyframes glitchShift {
      0%, 100% { transform: translate(0); opacity: 0.4; }
      33% { transform: translate(-2px, 1px); opacity: 0.6; }
      66% { transform: translate(2px, -1px); opacity: 0.4; }
    }

    /* ========== ANALOG WAVE BARS ========== */
    .waveform {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      height: 80px;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }

    .wave-bar {
      width: 6px;
      background: linear-gradient(to top, #ff4d6d, #ff8c42);
      border-radius: 4px;
      animation: barWave 0.8s ease-in-out infinite alternate;
      transform-origin: bottom;
    }

    @keyframes barWave {
      0% { height: 6px; opacity: 0.5; }
      100% { height: var(--h, 48px); opacity: 1; }
    }

    /* ========== BADGE ========== */
    .signal-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 77, 109, 0.12);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 77, 109, 0.3);
      padding: 8px 24px;
      border-radius: 60px;
      margin-bottom: 1.5rem;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: #ff4d6d;
      border-radius: 50%;
      box-shadow: 0 0 8px #ff4d6d;
      animation: pulse 1.2s ease-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.2); }
    }

    .badge-text {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ff4d6d;
    }

    /* ========== TITLE ========== */
    h1 {
      font-size: clamp(1.6rem, 5vw, 2.5rem);
      font-weight: 800;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #ff4d6d, #ff8c42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .error-desc {
      font-size: 1rem;
      line-height: 1.7;
      color: #4a4a6a;
      max-width: 480px;
      margin: 0 auto 1.8rem;
    }

    /* ========== FREQUENCY METER ========== */
    .freq-panel {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 77, 109, 0.25);
      border-radius: 20px;
      padding: 1rem 1.5rem;
      margin: 1.5rem auto;
      max-width: 380px;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .freq-item {
      flex: 1;
      text-align: center;
    }

    .freq-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #ff6b8a;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .freq-value {
      font-size: 1.2rem;
      font-weight: 700;
      font-family: monospace;
      background: linear-gradient(135deg, #ff4d6d, #ff8c42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* ========== BUTTONS ========== */
    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 1.8rem 0 2rem;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #ff4d6d, #ff8c42);
      border: none;
      padding: 12px 32px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(255, 77, 109, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 77, 109, 0.4);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 2px solid rgba(255, 77, 109, 0.4);
      padding: 12px 32px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #ff4d6d;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn-secondary:hover {
      border-color: #ff4d6d;
      background: rgba(255, 77, 109, 0.1);
      transform: translateY(-3px);
    }

    /* ========== QUICK LINKS ========== */
    .quick-links {
      border-top: 1px solid rgba(255, 77, 109, 0.2);
      padding-top: 1.5rem;
      margin-top: 0.5rem;
    }

    .quick-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ff8c6b;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .links-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .quick-link {
      padding: 8px 18px;
      background: rgba(255, 245, 235, 0.8);
      border: 1px solid rgba(255, 77, 109, 0.2);
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #5a5a7a;
      text-decoration: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .quick-link:hover {
      border-color: #ff4d6d;
      color: #ff4d6d;
      transform: translateY(-2px);
      background: rgba(255, 77, 109, 0.08);
    }

    /* ========== STATIC COUNTER ========== */
    .static-counter {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 0.65rem;
      font-family: monospace;
      color: rgba(255, 77, 109, 0.6);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      padding: 5px 12px;
      border-radius: 20px;
      z-index: 20;
      font-weight: 500;
    }

    /* ========== RESPONSIVE DESIGN ========== */
    /* Tablet (769px–1199px) - 2 columns layout for links grid */
    @media (min-width: 769px) and (max-width: 1199px) {
      .links-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        max-width: 400px;
        margin: 0 auto;
      }
      
      .quick-link {
        justify-content: center;
      }
      
      .error-content {
        padding: 2.5rem 2rem;
        max-width: 700px;
      }
      
      .freq-panel {
        max-width: 420px;
      }
      
      .waveform {
        height: 70px;
        gap: 6px;
      }
      
      .wave-bar {
        width: 5px;
      }
    }

    /* iPad Air, iPad Mini, iPad Pro, Surface Pro 7, Nest Hub, Nest Hub Max (768px-1024px) */
    @media (min-width: 768px) and (max-width: 1024px) {
      .error-content {
        margin: 2rem;
        padding: 2rem 2rem;
      }
      
      .links-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        max-width: 450px;
        margin: 0 auto;
      }
      
      .quick-link {
        justify-content: center;
      }
      
      .action-buttons {
        gap: 1rem;
      }
      
      .btn-primary, .btn-secondary {
        padding: 10px 28px;
      }
    }

    /* Asus Zenbook Fold (tablet unfolded) / Galaxy Z Fold 5 unfolded (720px-1023px) */
    @media (min-width: 720px) and (max-width: 1023px) {
      .links-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        max-width: 420px;
      }
      
      .quick-link {
        padding: 8px 16px;
        font-size: 0.78rem;
      }
      
      .freq-panel {
        max-width: 400px;
      }
    }

    /* Mobile (≤768px) - 1 column */
    @media (max-width: 768px) {
      .error-container {
        padding: 1.5rem;
      }
      
      .error-content {
        padding: 2rem 1.5rem;
        border-radius: 32px;
      }
      
      .links-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 280px;
        margin: 0 auto;
      }
      
      .quick-link {
        justify-content: center;
        width: 100%;
      }
      
      .freq-panel {
        padding: 0.8rem 1rem;
        max-width: 320px;
        gap: 0.8rem;
      }
      
      .freq-value {
        font-size: 1rem;
      }
      
      .btn-primary, .btn-secondary {
        padding: 10px 24px;
        font-size: 0.85rem;
      }
      
      .wave-bar {
        width: 4px;
      }
      
      .waveform {
        height: 65px;
        gap: 4px;
      }
    }

    /* Small Mobile (≤480px) - compact */
    @media (max-width: 480px) {
      .error-content {
        padding: 1.8rem 1.2rem;
      }
      
      .action-buttons {
        flex-direction: column;
        width: 100%;
      }
      
      .btn-primary, .btn-secondary {
        width: 100%;
        justify-content: center;
      }
      
      .links-grid {
        max-width: 260px;
      }
      
      .quick-link {
        padding: 8px 14px;
        font-size: 0.75rem;
      }
      
      .freq-panel {
        max-width: 280px;
        flex-direction: column;
        gap: 0.6rem;
        align-items: center;
      }
      
      .freq-item {
        width: 100%;
      }
      
      .glitch {
        font-size: clamp(4rem, 16vw, 8rem);
      }
      
      .signal-badge {
        padding: 6px 18px;
      }
      
      .badge-text {
        font-size: 0.65rem;
      }
    }

    /* Galaxy Z Fold 5 folded (≤360px) */
    @media (max-width: 360px) {
      .error-content {
        padding: 1.5rem 1rem;
      }
      
      .links-grid {
        max-width: 240px;
      }
      
      .quick-link {
        padding: 6px 12px;
        font-size: 0.7rem;
      }
      
      .waveform {
        height: 50px;
        gap: 3px;
      }
      
      .wave-bar {
        width: 3px;
      }
      
      .glitch {
        font-size: clamp(3rem, 14vw, 6rem);
      }
    }

    /* Landscape mode on tablets */
    @media (max-width: 900px) and (orientation: landscape) and (max-height: 500px) {
      .error-container {
        min-height: auto;
        padding: 1.5rem;
      }
      
      .error-content {
        padding: 1.2rem 1.5rem;
      }
      
      .waveform {
        height: 45px;
        margin: 1rem 0;
      }
      
      .glitch {
        font-size: 4rem;
      }
      
      .freq-panel {
        margin: 1rem auto;
        padding: 0.6rem 1rem;
      }
      
      .action-buttons {
        margin: 1rem 0 1.2rem;
      }
      
      .quick-links {
        padding-top: 1rem;
      }
    }

    /* Surface Duo / dual screen (540px-720px) */
    @media (min-width: 540px) and (max-width: 720px) and (orientation: portrait) {
      .error-content {
        padding: 2rem 1.8rem;
      }
      
      .links-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        max-width: 400px;
      }
      
      .quick-link {
        justify-content: center;
      }
    }

    /* Nest Hub Max (1280x800) */
    @media (width: 1280px) and (max-height: 800px) {
      .error-container {
        min-height: auto;
        padding: 2rem;
      }
      
      .error-content {
        padding: 2.5rem 2rem;
      }
    }
  </style>
</head>
<body>

  <!-- Animated Background -->
  <div class="wave-bg">
    <div class="wave"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="error-container">
    <div class="error-content">
      
      <!-- Signal Badge -->
      <div class="signal-badge">
        <span class="pulse-dot"></span>
        <span class="badge-text">✦ SIGNAL INTERRUPTED ✦</span>
      </div>

      <!-- Glitch 404 -->
      <div class="glitch-wrapper">
        <div class="glitch">404</div>
      </div>

      <!-- Animated Waveform -->
      <div class="waveform" id="waveform"></div>

      <!-- Main Message -->
      <h1>Frequency Not Found</h1>
      <p class="error-desc">
        You've wandered into a dead zone. The page you're looking for has left the airwaves — maybe it was relocated, renamed, or never broadcast at all.
      </p>

      <!-- Frequency Meter -->
      <div class="freq-panel" id="freqPanel">
        <div class="freq-item">
          <div class="freq-label">Tuned To</div>
          <div class="freq-value" id="freqValue">404.0 MHz</div>
        </div>
        <div class="freq-item">
          <div class="freq-label">Signal</div>
          <div class="freq-value" id="signalValue">LOST</div>
        </div>
        <div class="freq-item">
          <div class="freq-label">Mode</div>
          <div class="freq-value" id="modeValue">STATIC</div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <a href="index.html" class="btn-primary">
          <i class="bi bi-house-door-fill"></i>
          Return to Home
        </a>
        <a href="#" id="goBackBtn" class="btn-secondary">
          <i class="bi bi-arrow-left"></i>
          Go Back
        </a>
      </div>

   

  <div class="static-counter" id="staticCounter">SIGNAL LOSS | 404.0</div>

  <script>
    // ========== DYNAMIC WAVEFORM ==========
    const waveform = document.getElementById('waveform');
    const bars = [28, 42, 58, 72, 64, 48, 36, 54, 68, 44, 32, 52, 76, 60, 38, 46, 62, 34, 50, 70, 56, 40, 30, 48, 66, 44, 52, 38];
    
    bars.forEach((height, idx) => {
      const bar = document.createElement('div');
      bar.className = 'wave-bar';
      bar.style.setProperty('--h', `${height}px`);
      bar.style.animationDelay = `${idx * 0.04}s`;
      bar.style.animationDuration = `${0.7 + Math.random() * 0.3}s`;
      waveform.appendChild(bar);
    });

    // ========== FREQUENCY FLICKER (Analog Drift) ==========
    const freqEl = document.getElementById('freqValue');
    const signalEl = document.getElementById('signalValue');
    const modeEl = document.getElementById('modeValue');
    
    setInterval(() => {
      // Random frequency flicker
      if (Math.random() > 0.85) {
        const fakeFreq = (Math.random() * 150 + 88).toFixed(1);
        freqEl.textContent = fakeFreq + ' MHz';
        setTimeout(() => {
          freqEl.textContent = '404.0 MHz';
        }, 180);
      }
      
      // Signal strength flicker
      if (Math.random() > 0.88) {
        const signals = ['LOST', 'WEAK', 'STATIC', '---', '???', 'NOISE'];
        signalEl.textContent = signals[Math.floor(Math.random() * signals.length)];
        setTimeout(() => {
          signalEl.textContent = 'LOST';
        }, 200);
      }
      
      // Mode glitch
      if (Math.random() > 0.92) {
        const modes = ['NOISE', 'DRIFT', 'ECHO', 'DISTORT', 'GLITCH'];
        modeEl.textContent = modes[Math.floor(Math.random() * modes.length)];
        setTimeout(() => {
          modeEl.textContent = 'STATIC';
        }, 250);
      }
    }, 1800);

    // ========== STATIC COUNTER ANIMATION ==========
    const staticCounter = document.getElementById('staticCounter');
    let counter = 404;
    setInterval(() => {
      if (Math.random() > 0.7) {
        counter = Math.floor(Math.random() * 500) + 88;
        staticCounter.textContent = `SIGNAL LOSS | ${counter}.${Math.floor(Math.random() * 99)}`;
        setTimeout(() => {
          staticCounter.textContent = 'SIGNAL LOSS | 404.0';
        }, 400);
      }
    }, 2800);

    // ========== GO BACK FUNCTION ==========
    const goBackBtn = document.getElementById('goBackBtn');
    if (goBackBtn) {
      goBackBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = 'index.html';
        }
      });
    }

    // ========== RANDOM GLITCH TEXT EFFECT ==========
    const glitchText = document.querySelector('.glitch');
    if (glitchText) {
      setInterval(() => {
        if (Math.random() > 0.94) {
          glitchText.style.transform = 'translateX(2px)';
          setTimeout(() => {
            glitchText.style.transform = 'translateX(-1px)';
          }, 50);
          setTimeout(() => {
            glitchText.style.transform = 'translateX(0)';
          }, 100);
        }
      }, 800);
    }

    // ========== MOUSE PARALLAX FOR BACKGROUND ==========
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      const blobs = document.querySelectorAll('.blob');
      blobs.forEach((blob, index) => {
        const speed = (index + 1) * 0.5;
        blob.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
      });
    });

    // ========== FALLBACK FOR OLDER BROWSERS ==========
    window.addEventListener('load', () => {
      const barsList = document.querySelectorAll('.wave-bar');
      if (barsList.length === 0) {
        for (let i = 0; i < 28; i++) {
          const fallbackBar = document.createElement('div');
          fallbackBar.className = 'wave-bar';
          fallbackBar.style.setProperty('--h', `${30 + Math.random() * 50}px`);
          waveform.appendChild(fallbackBar);
        }
      }
    });
  </script>
</body>
</html>
